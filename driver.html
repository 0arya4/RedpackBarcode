<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#C62828" />
  <title>Red Pack — سایەق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
<div class="page-wrapper">

  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <div class="logo-icon">RP</div>
      RED PACK
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="user-info" id="driver-name">سایەق</span>
      <button class="btn-logout" onclick="Auth.logout()">چوونەدەرەوە</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="content-area">

    <!-- ══════════════ TAB: UNCOLLECTED ══════════════ -->
    <div id="tab-uncollected" class="tab-content active">
      <div class="filter-bar">
        <input class="form-input" type="text" id="search-uncollected"
          placeholder="🔍 گەڕان بە باڕکۆد..." dir="ltr" style="margin:0;" />
      </div>
      <div id="list-uncollected"></div>
    </div>

    <!-- ══════════════ TAB: WITH ME ══════════════════ -->
    <div id="tab-withme" class="tab-content">
      <div class="filter-bar">
        <input class="form-input" type="text" id="search-withme"
          placeholder="🔍 گەڕان بە باڕکۆد..." dir="ltr" style="margin:0;" />
      </div>
      <div id="list-withme"></div>
    </div>

    <!-- ══════════════ TAB: COMPLETED ════════════════ -->
    <div id="tab-completed" class="tab-content">
      <div class="filter-bar">
        <input class="form-input" type="text" id="search-completed"
          placeholder="🔍 گەڕان بە باڕکۆد..." dir="ltr" style="margin:0;" />
      </div>
      <div id="list-completed"></div>
    </div>

  </main>

  <!-- Floating Scan Button (hidden on completed tab) -->
  <button class="fab" id="driver-scan-fab">
    📷&nbsp;&nbsp;باڕکۆد بکە
  </button>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="uncollected">
      <span class="nav-icon">📥</span>
      <span class="nav-label">هەڵنەگیراو</span>
      <span class="nav-badge" id="badge-uncollected" style="display:none;"></span>
    </button>
    <button class="nav-item" data-tab="withme">
      <span class="nav-icon">🚗</span>
      <span class="nav-label">لای من</span>
      <span class="nav-badge" id="badge-withme" style="display:none;"></span>
    </button>
    <button class="nav-item" data-tab="completed">
      <span class="nav-icon">✅</span>
      <span class="nav-label">تەواوبوو</span>
    </button>
  </nav>

</div><!-- /page-wrapper -->

<!-- ══════════════════════════ MODAL: BARCODE SCANNER ══════════════════════════ -->
<div class="modal" id="modal-driver-scanner">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">📷 باڕکۆدکردن</span>
      <button class="modal-close" id="driver-scanner-close">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;text-align:center;">
        باڕکۆدی ستیکەر ئامانج بگرە بۆ وەرگرتنی پۆست
      </p>
      <div class="scanner-container">
        <div id="driver-scanner-view"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════ MODAL: PHOTO CAPTURE ══════════════════════════ -->
<div class="modal" id="modal-photo-capture">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">📷 وێنەی پۆست</span>
      <button class="modal-close" id="photo-skip-btn">بەبێ وێنە</button>
    </div>
    <div class="modal-body" style="text-align:center;">
      <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:16px;">
        وێنەی پاکەتەکە بگرە بۆ پشتڕاستکردنەوە
      </p>
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" />
      <div id="photo-preview-wrap" style="display:none;margin-bottom:16px;">
        <img id="photo-preview" style="width:100%;border-radius:10px;max-height:260px;object-fit:cover;" />
      </div>
      <button class="btn btn-primary btn-full" id="photo-take-btn" style="margin-bottom:8px;">📷 وێنە بگرە</button>
      <button class="btn btn-success btn-full" id="photo-confirm-btn" style="display:none;margin-bottom:8px;">✅ پاشەکەوتکردن</button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p>چاوەڕێبە...</p>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<!-- App Scripts -->
<script src="assets/js/config/firebase.js"></script>
<script src="assets/js/modules/utils.js"></script>
<script src="assets/js/modules/auth.js"></script>
<script src="assets/js/modules/barcode.js"></script>
<script src="assets/js/pages/driver.js"></script>

</body>
</html>
